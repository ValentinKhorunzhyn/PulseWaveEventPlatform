server:
  port: ${SERVER_PORT:8091}
  servlet:
    context-path: /

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/registar_db}
    username: ${DATABASE_USER:user}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 15
      pool-name: RegistarHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: registar
  kafka:
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:registration-group}

registration:
  processing:
    stale-event-minutes: 5
    max-retry-attempts: 3
    cleanup-days: 30
  metrics:
    cache-ttl-seconds: 30

registar:
  confirmation:
    interval: 5000

logging:
  level:
    com.khorunzhyn.registar: ${LOGGING_LEVEL_REGISTRATION:INFO}
    org.springframework.kafka: ${LOGGING_LEVEL_KAFKA:WARN}
    org.hibernate.SQL: ${LOGGING_LEVEL_HIBERNATE_SQL:WARN}