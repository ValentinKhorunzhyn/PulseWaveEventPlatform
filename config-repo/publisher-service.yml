server:
  port: ${SERVER_PORT:8090}
  servlet:
    context-path: /

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/publisher_db}
    username: ${DATABASE_USER:user}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      pool-name: PublisherHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: publisher
  kafka:
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:publisher-group}

publisher:
  id: ${PUBLISHER_ID:publisher-default}
  name: ${PUBLISHER_NAME:Event Publisher}
  instance:
    id: ${INSTANCE_ID:1}
  interval:
    ms: ${PUBLISHER_INTERVAL_MS:5000}
  initial-delay:
    ms: ${PUBLISHER_INITIAL_DELAY_MS:10000}

logging:
  level:
    com.khorunzhyn.publisher: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: WARN